# ═══════════════════════════════════════════════════════════════════
#  Panoptica365 — Release build pipeline
# ═══════════════════════════════════════════════════════════════════
#
# Triggered when a Git tag matching `v*.*.*` is pushed (e.g. `v0.1.0`,
# `v1.2.3`). Builds the application Docker image from the repository's
# Dockerfile and pushes it to GitHub Container Registry at
# `ghcr.io/panoptica365/app:<tag>`.
#
# WHAT GETS PUBLISHED IN GHCR:
#   For a Git tag of `v0.1.2`, the resulting GHCR image is tagged with:
#     - v0.1.2     (full Git tag — for exact-pin pulls)
#     - 0.1.2      (no v prefix — convenience tag)
#     - 0.1        (major.minor — for "patch updates auto-flow" pulls)
#     - latest     (moving pointer to the most recent release)
#
# IMAGES ARE PRIVATE BY DEFAULT.
#   GHCR inherits visibility from the publishing org's package settings.
#   New packages default to private. When we want MSPs to pull without
#   authenticating (Stage 4+), flip the package's visibility to public
#   via the package settings page (one-click).
#
# PLATFORM = LINUX/AMD64 ONLY.
#   Every MSP-grade Linux server is x86_64. Adding linux/arm64 doubles
#   build time + storage with no current customer demand. Easy to add
#   later by appending `,linux/arm64` to the `platforms:` line.
#
# LAYER CACHING:
#   buildx's GitHub Actions cache backend (`type=gha`) persists Docker
#   layers between runs. Most of the image's bulk (PowerShell + .NET +
#   the three MS modules) never changes between releases, so cached
#   layers cut subsequent builds from ~15 minutes down to ~2-3 minutes.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# If a tag is pushed twice (or force-pushed), don't race two builds for
# the same artifact. The second one waits for the first to finish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build + Push to GHCR
    runs-on: ubuntu-latest

    permissions:
      # `packages: write` lets the workflow push images to ghcr.io for
      # this repo's owning org. `contents: read` lets it check out the
      # repo source. Anything beyond these two is intentionally NOT
      # granted — limits blast radius if the workflow file is ever
      # compromised.
      packages: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Guardrail (v0.1.7+) — fail fast if the VERSION file in the repo
      # disagrees with the pushed tag. Without this you can ship an image
      # tagged v0.1.X whose running app reports itself as v0.1.X-1 because
      # someone forgot to bump VERSION before tagging. Pure shell, no deps.
      - name: Verify VERSION file matches the pushed tag
        run: |
          file_version=$(tr -d '[:space:]' < VERSION)
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$file_version" != "$tag_version" ]; then
            echo "::error::VERSION file ($file_version) does not match git tag ($GITHUB_REF_NAME) — bump VERSION before tagging."
            exit 1
          fi
          echo "VERSION ($file_version) matches tag ($GITHUB_REF_NAME) ✓"

      - name: Verify manifest.json matches the pushed tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          manifest_version=$(node -e "process.stdout.write(require(\"./manifest.json\").latest.version)")
          manifest_tag=$(node -e "process.stdout.write(require(\"./manifest.json\").latest.image_tag)")
          if [ "$manifest_version" != "$tag_version" ]; then
            echo "::error::manifest.json latest.version ($manifest_version) does not match git tag ($GITHUB_REF_NAME) — bump manifest.json before tagging."
            exit 1
          fi
          if [ "$manifest_tag" != "$GITHUB_REF_NAME" ]; then
            echo "::error::manifest.json latest.image_tag ($manifest_tag) does not match git tag ($GITHUB_REF_NAME)."
            exit 1
          fi
          echo "manifest.json (version $manifest_version, tag $manifest_tag) matches tag ($GITHUB_REF_NAME) ✓"

      # Buildx is Docker's newer build frontend. Enables the GHA cache
      # backend (`type=gha`) plus multi-platform support if we ever
      # need it later.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GHCR using the workflow's automatic GITHUB_TOKEN.
      # No PAT or manually-managed secret needed — GitHub mints a
      # short-lived token per run that's scoped to this repo + the
      # permissions declared above.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate the full set of image tags from the Git tag.
      # Input ref `refs/tags/v0.1.2` → output tags: v0.1.2, 0.1.2, 0.1, latest
      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/panoptica365/app
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=true

      # The actual build. Pulls cached layers from previous runs to
      # speed up incremental builds, then pushes the resulting image
      # to GHCR with all the tags computed above.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Friendly summary that appears at the top of the workflow run
      # page on github.com — gives operators a quick "what was pushed
      # and how do I pull it" reference without digging into the logs.
      - name: Build summary
        run: |
          echo "## ✅ Release build complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Git tag:** \`${GITHUB_REF_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image tags pushed to GHCR:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Pull command:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ghcr.io/panoptica365/app:${GITHUB_REF_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
