<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="auth.page_title">Panoptica365 — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --p-bg: #0A1929;
    --p-surface: #0D2137;
    --p-accent: #1E88E5;
    --p-accent-bright: #42A5F5;
    --p-accent-deep: #1565C0;
    --p-accent-light: #64B5F6;
    --p-text: #E3F2FD;
    --p-text-secondary: #90CAF9;
    --p-text-muted: #546E7A;
    --p-border: #1A3A5C;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--p-bg) url('/img/login-background.webp') center center / cover no-repeat fixed;
    color: var(--p-text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Subtle darkening overlay — the background image is very light, so we pull
     it down slightly to keep the light login card visually anchored. Kept the
     original cyan/indigo radial tints on top to maintain brand continuity. */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(30, 136, 229, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(92, 107, 192, 0.06) 0%, transparent 60%),
      rgba(10, 25, 41, 0.18);
    pointer-events: none;
    z-index: 0;
  }

  /* Login card — matches the app's header chrome: diagonal pinstripe over a
     light top-to-bottom gradient, thin border, inset white hairline, soft
     drop shadow. Gives the dark-blue logo a light surface to contrast
     against, and carries brand continuity into the post-auth UI. */
  .login-container {
    text-align: center;
    max-width: 440px;
    padding: 52px 48px;
    position: relative;
    z-index: 1;
    background:
      repeating-linear-gradient(135deg, rgba(20, 32, 46, 0.035) 0 1px, transparent 1px 5px),
      linear-gradient(180deg, #EBF1F7 0%, #CDD5E0 100%);
    border: 1px solid rgba(10, 20, 36, 0.25);
    border-radius: 14px;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.6),
      0 8px 24px rgba(0, 0, 0, 0.35),
      0 16px 48px rgba(0, 0, 0, 0.22);
  }

  /* Cyan hairline accent at the top edge — echoes the "365" accent color
     and the app header's bottom hairline. */
  .login-container::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(92, 203, 244, 0) 10%,
      rgba(92, 203, 244, 0.55) 30%,
      rgba(92, 203, 244, 0.55) 70%,
      rgba(92, 203, 244, 0) 90%,
      transparent 100%);
    pointer-events: none;
  }

  .login-logo {
    margin-bottom: 24px;
  }

  .login-logo img {
    height: 56px;
    width: auto;
  }

  .login-subtitle {
    font-size: 0.85rem;
    font-weight: 400;
    color: #4C5E7A; /* chrome-text-sec, matches header secondary text */
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .login-divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(10, 20, 36, 0.2), transparent);
    margin: 0 auto 48px;
  }

  .login-btn {
    display: inline-block;
    padding: 14px 48px;
    background: var(--p-accent);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-decoration: none;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(30, 136, 229, 0.3);
  }

  .login-btn:hover {
    background: var(--p-accent-bright);
    box-shadow: 0 6px 28px rgba(30, 136, 229, 0.4);
    transform: translateY(-1px);
  }

  .login-btn:active {
    transform: translateY(0);
  }

  .login-error {
    margin-top: 24px;
    padding: 12px 20px;
    background: rgba(239, 83, 80, 0.1);
    border: 1px solid rgba(239, 83, 80, 0.3);
    border-radius: 8px;
    color: #EF5350;
    font-size: 0.85rem;
    display: none;
  }
</style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <img src="/img/panoptica365-logo.png" alt="Panoptica365">
    </div>
    <div class="login-subtitle" data-i18n="app.tagline">Multi-Tenant M365 Monitoring</div>
    <div class="login-divider"></div>
    <a href="/auth/login" class="login-btn" data-i18n="auth.login">Sign In with Microsoft</a>
    <div class="login-error" id="login-error"></div>
  </div>

  <!-- ═══ I18N (login.html — pre-auth, uses /api/i18n/<lang> which is unauthenticated) ═══ -->
  <!--
    The locale endpoint is publicly fetchable (no requireAuth gate), so this works
    before sign-in. Lang detection falls back to localStorage → browser → 'en'
    since user-prefs returns 401 for non-authenticated callers.
  -->
  <script src="/js/shared/i18n.js"></script>

  <script>
    // Show auth_error param as a visible error message. The error div carries
    // its own data-i18n so the i18n.js DOMContentLoaded walker translates it.
    // English is set as immediate fallback so users without a working locale
    // load see something readable.
    const params = new URLSearchParams(window.location.search);
    const err = params.get('auth_error');
    if (err) {
      const el = document.getElementById('login-error');
      const keyMap = {
        unauthorized:    'auth.unauthorized',
        state_mismatch:  'auth.state_mismatch',
        callback_failed: 'auth.callback_failed',
      };
      const fallbacks = {
        unauthorized:    'You are not authorized to access Panoptica365.',
        state_mismatch:  'Authentication state mismatch. Please try again.',
        callback_failed: 'Authentication failed. Please try again.',
      };
      const key = keyMap[err];
      if (key) {
        el.setAttribute('data-i18n', key);
        el.textContent = fallbacks[err];
        // If i18n.js has already loaded, re-walk so the just-set data-i18n picks up
        if (window.PanopticaI18n && window.PanopticaI18n.applyTo) {
          window.PanopticaI18n.applyTo(el);
        }
      } else {
        el.textContent = err;
      }
      el.style.display = 'block';
    }
  </script>
</body>
</html>
