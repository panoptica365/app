<!-- ═══ REPORTS PAGE ═══ -->

<!-- Report Controls -->
<div class="panel" style="margin-bottom: 16px;">
  <div class="panel-header">
    <div class="panel-elbow" style="background: var(--p-highlight-alt);"></div>
    <span class="panel-title" data-i18n="reports.title">Report Generation</span>
  </div>
  <div style="padding: 8px 16px 20px 16px;">
    <div style="display: flex; gap: 24px; align-items: flex-end; flex-wrap: wrap;">

      <!-- Tenant Selector -->
      <div class="form-group" style="flex: 1; min-width: 220px; margin-bottom:0;">
        <label data-i18n="reports.label_tenant">Tenant</label>
        <select id="report-tenant">
          <option value="" data-i18n="tenants.loading">Loading tenants...</option>
        </select>
      </div>

      <!-- Report Type -->
      <div class="form-group" style="flex: 0 0 280px; margin-bottom:0;">
        <label data-i18n="reports.label_report_type">Report Type</label>
        <select id="report-type">
          <option value="security-posture" data-i18n="reports.type_security_posture">Security Posture Report (PDF)</option>
          <option value="documentation" data-i18n="reports.type_documentation">Configuration Documentation (PDF)</option>
          <option value="json-export" data-i18n="reports.type_data_export_json">Data Export (JSON)</option>
          <option value="data-export" data-i18n="reports.type_tenant_snapshot">Tenant Snapshot (ZIP)</option>
        </select>
      </div>

      <!-- Date Range -->
      <div class="form-group" style="flex: 0 0 180px; margin-bottom:0;">
        <label data-i18n="reports.label_time_range">Time Range</label>
        <select id="report-range">
          <option value="7d" data-i18n="reports.range_7d">Last 7 Days</option>
          <option value="30d" selected data-i18n="reports.range_30d">Last 30 Days</option>
          <option value="90d" data-i18n="reports.range_90d">Last 90 Days</option>
        </select>
      </div>

      <!-- Generate Button -->
      <div style="flex: 0 0 auto; padding-bottom: 2px;">
        <button id="report-generate-btn" class="btn-primary" data-role-required="member" style="white-space:nowrap;" data-i18n="reports.generate">
          Generate Report
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Recent Reports -->
<div class="panel">
  <div class="panel-header">
    <div class="panel-elbow" style="background: var(--p-highlight-alt);"></div>
    <span class="panel-title" data-i18n="reports.recent_title">Recent Reports</span>
  </div>
  <div style="padding: 8px 16px 16px 16px;">
    <div id="report-history" style="color: var(--p-text-muted); font-family:Inter,sans-serif; font-size: 0.9rem;" data-i18n="reports.no_reports_session">
      No reports generated this session.
    </div>
  </div>
</div>

<!-- ═══ REPORT GENERATION MODAL ═══ -->
<div id="report-gen-overlay" class="modal-overlay">
  <div class="modal" style="width:520px; max-width:90vw;">
    <div class="modal-header">
      <div class="mh-elbow"></div>
      <span class="mh-title" id="gen-title" data-i18n="reports.gen_modal_title">Generating Report</span>
    </div>

    <!-- Progress stages -->
    <div class="modal-body report-gen-body">
      <div class="report-gen-stage" id="gen-stage-data">
        <span class="stage-indicator pending"></span>
        <span class="stage-label" data-i18n="reports.gen_stage_data">Gathering tenant data</span>
      </div>
      <div class="report-gen-stage" id="gen-stage-ca_policies">
        <span class="stage-indicator pending"></span>
        <span class="stage-label" data-i18n="reports.gen_stage_ca">Fetching Conditional Access policies</span>
      </div>
      <div class="report-gen-stage" id="gen-stage-charts">
        <span class="stage-indicator pending"></span>
        <span class="stage-label" data-i18n="reports.gen_stage_charts">Rendering charts</span>
      </div>
      <div class="report-gen-stage" id="gen-stage-ai">
        <span class="stage-indicator pending"></span>
        <span class="stage-label" data-i18n="reports.gen_stage_ai">Sonnet analyzing security posture</span>
      </div>
      <div class="report-gen-stage" id="gen-stage-pdf">
        <span class="stage-indicator pending"></span>
        <span class="stage-label" data-i18n="reports.gen_stage_pdf">Assembling report</span>
      </div>
      <div class="report-gen-stage" id="gen-stage-done" style="display:none;">
        <span class="stage-indicator done"></span>
        <span class="stage-label" data-i18n="reports.gen_stage_done">Report ready</span>
      </div>

      <!-- Progress scanner animation -->
      <div class="report-gen-scanner">
        <div class="scanner-track">
          <div class="scanner-beam"></div>
        </div>
      </div>

      <!-- Tenant/range info -->
      <div class="report-gen-info" id="gen-info-text"></div>
    </div>
  </div>
</div>
