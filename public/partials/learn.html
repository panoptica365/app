<!-- ═══ LEARN ═══ -->
<div class="panel-header" style="margin-bottom:16px;">
  <div class="panel-elbow" style="background: var(--p-secondary-muted);"></div>
  <span class="panel-title learn-page-title">
    <i data-lucide="graduation-cap" class="learn-title-icon"></i>
    <span data-i18n="learn.title">Learn</span>
  </span>
</div>

<!-- ─── Index view: topic cards ─── -->
<div id="learn-index-view">
  <div class="settings-card-grid" id="learn-topic-grid"></div>
</div>

<!-- ─── Topic view: back button + topic header + lesson cards ─── -->
<div id="learn-topic-view" style="display:none;">
  <button class="btn-secondary learn-back-btn" id="learn-back" style="margin-bottom:16px;">
    &larr; <span data-i18n="learn.back_to_topics">Back to topics</span>
  </button>

  <div class="learn-topic-header">
    <div class="learn-topic-header-icon" id="learn-topic-icon"><i data-lucide="book-open"></i></div>
    <div class="learn-topic-header-text">
      <div class="learn-topic-header-title" id="learn-topic-title"></div>
      <div class="learn-topic-header-sub" id="learn-topic-subtitle"></div>
    </div>
  </div>

  <div class="settings-card-grid" id="learn-lesson-grid"></div>
  <div id="learn-lesson-empty" class="td-no-data" style="display:none;" data-i18n="learn.empty_state">No lessons in this topic yet.</div>
</div>

<!-- ─── Lesson modal (large, near-fullscreen) ─── -->
<div class="learn-modal-overlay" id="learn-modal-overlay">
  <div class="learn-modal" role="dialog" aria-modal="true" aria-labelledby="learn-modal-title">
    <div class="learn-modal-header">
      <h1 class="learn-modal-title" id="learn-modal-title"></h1>
      <button class="learn-modal-close" id="learn-modal-close" aria-label="Close" data-i18n-attr-aria-label="learn.close">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div class="learn-modal-body" id="learn-modal-body"></div>
  </div>
</div>
