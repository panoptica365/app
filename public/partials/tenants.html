<!-- ═══ TENANT MANAGEMENT ═══ -->
<div class="panel-header" style="margin-bottom:0;">
  <div class="panel-elbow" style="background: var(--p-secondary);"></div>
  <span class="panel-title" data-i18n="tenants.title">Tenant Management</span>
</div>

<div class="tenant-mgmt-toolbar">
  <span class="label" id="tenants-count"></span>
  <button class="btn-primary" id="btn-add-tenant" data-role-required="admin" data-i18n="tenants.add_tenant">Add Tenant</button>
</div>

<!-- Consent status messages -->
<div id="consent-message" style="display:none; margin-bottom:16px;"></div>

<!-- Tenant Table -->
<div id="tenants-table-body">
  <div class="loading-container">
    <div class="loading-spinner"></div>
    <span data-i18n="tenants.loading">Loading tenants...</span>
  </div>
</div>
