<!-- ═══ SYSTEM > AUDIT LOG (Admin-only) ═══ -->
<!--
  MSP-level audit journal. Backed by /api/msp-audit/events.
  RBAC: Admin-only — the partial route + API both enforce requireAdmin.
  Rendered read-only by design. Audit rows are append-only; no edit/delete.
-->
<div class="panel-header" style="margin-bottom:16px;">
  <div class="panel-elbow" style="background: var(--p-secondary-muted);"></div>
  <span class="panel-title" data-i18n="audit_log.title">Audit Log</span>
  <span class="panel-subtitle" id="audit-panel-subtitle" style="margin-left:12px;color:var(--p-text-muted);font-size:0.85rem;" data-i18n="audit_log.subtitle">
    MSP-level operator actions — append-only, Admin-only
  </span>
</div>

<!-- ─── View tabs ─── -->
<div class="audit-tabs" style="display:flex; gap:2px; margin-bottom:14px; border-bottom:1px solid var(--p-border);">
  <button class="audit-tab-btn" id="audit-tab-msp" data-view="msp" style="
    background:transparent; border:none; outline:none; border-bottom:2px solid var(--p-secondary-muted);
    color:var(--p-text); padding:8px 18px; cursor:pointer; font-size:0.85rem;
    letter-spacing:0.06em; text-transform:uppercase; font-weight:500;
  " data-i18n="audit_log.tab_msp">MSP Audit</button>
  <button class="audit-tab-btn" id="audit-tab-unified" data-view="unified" style="
    background:transparent; border:none; outline:none; border-bottom:2px solid transparent;
    color:var(--p-text-muted); padding:8px 18px; cursor:pointer; font-size:0.85rem;
    letter-spacing:0.06em; text-transform:uppercase; font-weight:500;
  " data-i18n="audit_log.tab_unified">Unified Timeline</button>
</div>

<!-- ─── Summary strip (MSP view only) ─── -->
<div id="audit-summary" class="audit-summary" style="
  display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
  gap:8px; margin-bottom:16px;
">
  <!-- populated by JS -->
</div>

<!-- ─── Filter bar (MSP view) ─── -->
<div class="audit-filter-bar" id="audit-filter-bar-msp" style="
  display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end;
  padding:12px; border:1px solid var(--p-border);
  border-radius:6px; margin-bottom:14px;
  background:var(--p-panel-bg);
">
  <div class="form-group" style="flex:1; min-width:150px;">
    <label style="font-size:0.75rem;color:var(--p-text-muted);" data-i18n="audit_log.filter_category">Category</label>
    <select id="audit-filter-category">
      <option value="" data-i18n="audit_log.cat_all">All categories</option>
      <option value="auth" data-i18n="audit_log.cat_auth">Auth</option>
      <option value="template_crud" data-i18n="audit_log.cat_template_crud">Template CRUD</option>
      <option value="rbac_change" data-i18n="audit_log.cat_rbac_change">RBAC change</option>
      <option value="settings_change" data-i18n="audit_log.cat_settings_change">Settings change</option>
      <option value="tenant_lifecycle_msp" data-i18n="audit_log.cat_tenant_lifecycle">Tenant lifecycle</option>
      <option value="export" data-i18n="audit_log.cat_export">Export</option>
      <option value="other" data-i18n="audit_log.cat_other">Other</option>
    </select>
  </div>

  <div class="form-group" style="flex:1; min-width:150px;">
    <label style="font-size:0.75rem;color:var(--p-text-muted);" data-i18n="audit_log.filter_actor">Actor email contains</label>
    <input type="text" id="audit-filter-actor" placeholder="e.g. jacques" data-i18n-attr-placeholder="audit_log.placeholder_actor">
  </div>

  <div class="form-group" style="flex:2; min-width:200px;">
    <label style="font-size:0.75rem;color:var(--p-text-muted);" data-i18n="audit_log.filter_description">Description contains</label>
    <input type="text" id="audit-filter-q" placeholder="free-text search" data-i18n-attr-placeholder="audit_log.placeholder_search">
  </div>

  <div class="form-group" style="flex:1; min-width:140px;">
    <label style="font-size:0.75rem;color:var(--p-text-muted);" data-i18n="audit_log.filter_from">From</label>
    <input type="datetime-local" id="audit-filter-from">
  </div>

  <div class="form-group" style="flex:1; min-width:140px;">
    <label style="font-size:0.75rem;color:var(--p-text-muted);" data-i18n="audit_log.filter_to">To</label>
    <input type="datetime-local" id="audit-filter-to">
  </div>

  <div class="form-group" style="flex:0 0 auto;">
    <label style="font-size:0.75rem;color:var(--p-text-muted);" data-i18n="audit_log.filter_outcome">Outcome</label>
    <select id="audit-filter-success">
      <option value="" data-i18n="audit_log.outcome_all">All</option>
      <option value="true" data-i18n="audit_log.outcome_success">Success</option>
      <option value="false" data-i18n="audit_log.outcome_failure">Failure</option>
    </select>
  </div>

  <!--
    Wrapped in .form-group with an invisible spacer label so the buttons
    line up with the input row instead of sitting below it. The filter
    bar uses align-items:flex-end, which aligns bottoms — without the
    matching label height, the bare button wrapper is shorter than the
    form-groups and ends up vertically offset.
  -->
  <!--
    Button heights are unified by a .audit-filter-bar scoped CSS rule in
    panoptica.css that forces inputs/selects/btn-primary/btn-secondary to
    the same 40px height — so tops and bottoms align regardless of each
    control's native padding/font-size differences. Wrapped in a .form-group
    with an invisible spacer label so the column has the same label-above-
    content structure as the real filter columns.
  -->
  <div class="form-group" style="flex:0 0 auto;">
    <label style="visibility:hidden;">.</label>
    <div style="display:flex;gap:6px;">
      <button class="btn-primary" id="audit-apply" data-i18n="audit_log.btn_apply">Apply</button>
      <button class="btn-secondary" id="audit-reset" data-i18n="audit_log.btn_reset">Reset</button>
    </div>
  </div>
</div>

<!-- ─── Filter bar (Unified view) — hidden until the tab is selected ─── -->
<div class="audit-filter-bar" id="audit-filter-bar-unified" style="
  display:none; flex-wrap:wrap; gap:10px; align-items:flex-end;
  padding:12px; border:1px solid var(--p-border);
  border-radius:6px; margin-bottom:14px;
  background:var(--p-panel-bg);
">
  <div class="form-group" style="flex:1; min-width:150px;">
    <label style="font-size:0.75rem;color:var(--p-text-muted);" data-i18n="audit_log.filter_source">Source</label>
    <select id="unified-filter-source">
      <option value="all" data-i18n="audit_log.source_all">All sources</option>
      <option value="msp" data-i18n="audit_log.source_msp">MSP audit only</option>
      <option value="tenant" data-i18n="audit_log.source_tenant_all">All tenant events</option>
      <option value="tenant-auto" data-i18n="audit_log.source_tenant_auto">Tenant — Panoptica auto</option>
      <option value="tenant-manual" data-i18n="audit_log.source_tenant_manual">Tenant — operator manual</option>
    </select>
  </div>

  <div class="form-group" style="flex:1; min-width:150px;">
    <label style="font-size:0.75rem;color:var(--p-text-muted);" data-i18n="audit_log.filter_tenant">Tenant</label>
    <select id="unified-filter-tenant">
      <option value="" data-i18n="audit_log.all_tenants">All tenants</option>
    </select>
  </div>

  <div class="form-group" style="flex:2; min-width:200px;">
    <label style="font-size:0.75rem;color:var(--p-text-muted);" data-i18n="audit_log.filter_description">Description contains</label>
    <input type="text" id="unified-filter-q" placeholder="free-text search" data-i18n-attr-placeholder="audit_log.placeholder_search">
  </div>

  <div class="form-group" style="flex:1; min-width:140px;">
    <label style="font-size:0.75rem;color:var(--p-text-muted);" data-i18n="audit_log.filter_from">From</label>
    <input type="datetime-local" id="unified-filter-from">
  </div>

  <div class="form-group" style="flex:1; min-width:140px;">
    <label style="font-size:0.75rem;color:var(--p-text-muted);" data-i18n="audit_log.filter_to">To</label>
    <input type="datetime-local" id="unified-filter-to">
  </div>

  <div class="form-group" style="flex:0 0 auto;">
    <label style="visibility:hidden;">.</label>
    <div style="display:flex;gap:6px;">
      <button class="btn-primary" id="unified-apply" data-i18n="audit_log.btn_apply">Apply</button>
      <button class="btn-secondary" id="unified-reset" data-i18n="audit_log.btn_reset">Reset</button>
    </div>
  </div>
</div>

<!-- ─── Results table ─── -->
<div class="audit-results" style="border:1px solid var(--p-border);border-radius:6px;overflow:hidden;">
  <div id="audit-results-status" style="
    padding:8px 12px; background:var(--p-panel-bg);
    border-bottom:1px solid var(--p-border);
    font-size:0.85rem; color:var(--p-text-muted);
    display:flex; justify-content:space-between; align-items:center;
  ">
    <span id="audit-count-label" data-i18n="audit_log.loading">Loading…</span>
    <span id="audit-pagination-controls">
      <button class="btn-secondary" id="audit-prev" style="padding:2px 10px;" data-i18n="audit_log.btn_prev">&larr; Prev</button>
      <button class="btn-secondary" id="audit-next" style="padding:2px 10px;" data-i18n="audit_log.btn_next">Next &rarr;</button>
    </span>
  </div>

  <table class="audit-table" style="width:100%;border-collapse:collapse;">
    <thead>
      <tr>
        <th style="text-align:left;padding:8px 12px;font-size:0.75rem;color:var(--p-text-muted);font-weight:600;" data-i18n="audit_log.col_when">When</th>
        <th style="text-align:left;padding:8px 12px;font-size:0.75rem;color:var(--p-text-muted);font-weight:600;" data-i18n="audit_log.col_category">Category</th>
        <th style="text-align:left;padding:8px 12px;font-size:0.75rem;color:var(--p-text-muted);font-weight:600;" data-i18n="audit_log.col_action">Action</th>
        <th style="text-align:left;padding:8px 12px;font-size:0.75rem;color:var(--p-text-muted);font-weight:600;" data-i18n="audit_log.col_actor">Actor</th>
        <th style="text-align:left;padding:8px 12px;font-size:0.75rem;color:var(--p-text-muted);font-weight:600;" data-i18n="audit_log.col_description">Description</th>
        <th style="text-align:left;padding:8px 12px;font-size:0.75rem;color:var(--p-text-muted);font-weight:600;width:70px;" data-i18n="audit_log.col_outcome">Outcome</th>
      </tr>
    </thead>
    <tbody id="audit-rows">
      <!-- populated by JS -->
    </tbody>
  </table>
</div>

<!-- ─── Row detail slide-out ─── -->
<div class="audit-detail-overlay" id="audit-detail-overlay" style="display:none;"></div>
<div class="audit-detail-panel" id="audit-detail-panel" style="display:none;">
  <div class="audit-detail-header">
    <button class="audit-detail-close" id="audit-detail-close">&times;</button>
    <div class="audit-detail-title" id="audit-detail-title" data-i18n="audit_log.detail_title">Audit event</div>
  </div>
  <div class="audit-detail-body" id="audit-detail-body">
    <!-- populated on row click -->
  </div>
</div>
