<!-- ═══ MAIN CONSOLE ═══ -->

<!-- ─── TOP ROW: Briefing + Tenant List ─── -->
<div class="dashboard-top-row">

  <!-- Claude Daily Summary (left) -->
  <div class="briefing-card dashboard-top-left">
    <div class="panel-header">
      <div class="panel-elbow" style="background: var(--p-secondary);"></div>
      <span class="panel-title" data-i18n="main_console.briefing_title">Claude Daily Summary</span>
      <span class="label briefing-timestamp" id="briefing-timestamp" style="margin-left:auto;"></span>
    </div>
    <div id="briefing-content" class="briefing-body">
      <div class="loading-container" style="height:60px;">
        <div class="loading-spinner"></div>
        <span data-i18n="main_console.briefing_loading">Loading summary...</span>
      </div>
    </div>
    <div id="main-chat-thread" class="chat-thread" style="display:none;"></div>
    <!-- A3 (May 10, 2026): viewers see the daily briefing but not the
         Ask Claude input — they can't trigger /api/ai/chat (403). -->
    <div class="claude-chat-input" id="main-chat-container" data-role-required="member">
      <input type="text" id="main-chat-input" placeholder="Ask Claude about your tenants..." data-i18n-attr-placeholder="main_console.chat_input_placeholder" maxlength="1000">
      <button id="main-chat-send" data-role-required="member" data-i18n="main_console.chat_send">Ask</button>
      <button id="main-chat-new" class="chat-new-btn" data-role-required="member" style="display:none;" title="Start new conversation" data-i18n-attr-title="main_console.chat_new_title" data-i18n="main_console.chat_new">New</button>
    </div>
  </div>

  <!-- Tenant List (right) -->
  <div class="panel dashboard-top-right" id="tenant-list-panel" data-accent="cyan">
    <div class="panel-header">
      <div class="panel-elbow"></div>
      <span class="panel-title" data-i18n="main_console.tenants_panel">Tenants</span>
      <span class="label" id="tenant-count" style="margin-left:auto;"></span>
    </div>
    <!-- v0.1.17: tenant filter — case-insensitive substring match on display_name.
         Reuses the .ap-search-bar look from alert-policies for visual consistency. -->
    <div class="ap-search-bar" style="margin: 8px 12px 8px;">
      <svg class="ap-search-icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
        <circle cx="10.5" cy="10.5" r="6" fill="none" stroke="currentColor" stroke-width="1.8"/>
        <path d="M15 15 L20 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <input type="text" id="tenant-filter-input"
        placeholder="Filter tenants…"
        data-i18n-attr-placeholder="main_console.tenant_filter_placeholder"
        autocomplete="off" spellcheck="false">
      <button class="ap-search-clear" id="tenant-filter-clear" type="button"
        title="Clear filter" data-i18n-attr-title="main_console.tenant_filter_clear_title"
        style="display:none;">×</button>
    </div>
    <div id="tenant-list-body">
      <div class="loading-container" style="height:100px;">
        <div class="loading-spinner"></div>
        <span data-i18n="tenants.loading">Loading tenants...</span>
      </div>
    </div>
  </div>

</div>

<!-- ─── BOTTOM ROW: Scores + Alert Bar Chart (full width) ─── -->
<div class="panel dashboard-bottom-row" id="scores-alerts-panel" data-accent="green">
  <div class="panel-header">
    <div class="panel-elbow"></div>
    <span class="panel-title" data-i18n="main_console.scores_alerts_title">Secure Score & Alert Overview</span>
    <select id="alert-gauge-range" class="alert-gauge-range-select">
      <option value="open" selected data-i18n="main_console.range_open">Open</option>
      <option value="24h" data-i18n="main_console.range_24h">Last 24 Hours</option>
      <option value="7d" data-i18n="main_console.range_7d">Last 7 Days</option>
      <option value="30d" data-i18n="main_console.range_30d">Last 30 Days</option>
    </select>
  </div>
  <div class="scores-alerts-content">

    <!-- Secure Score Gauges (left side) -->
    <div class="scores-column">
      <!-- Average gauge -->
      <div class="gauge-container" style="height: 160px; position: relative;">
        <canvas id="secure-score-gauge" width="192" height="160"></canvas>
        <div class="gauge-label" style="position:absolute; bottom:18px; left:50%; transform:translateX(-50%);">
          <div class="gauge-value" id="secure-score-value" style="font-size:2rem;">—</div>
          <div class="gauge-sub" data-i18n="main_console.gauge_average">Average</div>
        </div>
      </div>
      <div class="scores-highlow">
        <!-- Highest gauge -->
        <div style="text-align:center; flex:1;">
          <div class="gauge-container" style="height:120px; position:relative;">
            <canvas id="score-high-gauge" width="150" height="120"></canvas>
            <div class="gauge-label" style="position:absolute; bottom:14px; left:50%; transform:translateX(-50%);">
              <div class="gauge-value" id="score-high-value" style="font-size:1.6rem;">—</div>
            </div>
          </div>
          <div id="score-high-name" style="font-family:Inter,sans-serif; font-size:0.8rem; color:var(--status-healthy); margin-top:2px;">—</div>
          <div style="font-size:0.55rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--p-text-muted); margin-top:2px;" data-i18n="main_console.gauge_highest">Highest</div>
        </div>
        <!-- Lowest gauge -->
        <div style="text-align:center; flex:1;">
          <div class="gauge-container" style="height:120px; position:relative;">
            <canvas id="score-low-gauge" width="150" height="120"></canvas>
            <div class="gauge-label" style="position:absolute; bottom:14px; left:50%; transform:translateX(-50%);">
              <div class="gauge-value" id="score-low-value" style="font-size:1.6rem;">—</div>
            </div>
          </div>
          <div id="score-low-name" style="font-family:Inter,sans-serif; font-size:0.8rem; color:var(--status-degraded); margin-top:2px;">—</div>
          <div style="font-size:0.55rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--p-text-muted); margin-top:2px;" data-i18n="main_console.gauge_lowest">Lowest</div>
        </div>
      </div>
    </div>

    <!-- Vertical divider -->
    <div class="scores-alerts-divider"></div>

    <!-- Alert Bar Chart (right side) -->
    <div class="alerts-column">
      <canvas id="alert-bar-chart" height="320"></canvas>
    </div>

  </div>
</div>
