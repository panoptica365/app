<!-- ═══ ALERT POLICIES ═══ -->
<div class="panel-header" style="margin-bottom:16px;">
  <div class="panel-elbow" style="background: var(--p-secondary-light);"></div>
  <span class="panel-title" data-i18n="alert_policies.title">Alert Policies</span>
</div>

<!-- Search bar — filters by name/description and auto-expands sections containing matches.
     Added May 6, 2026 alongside collapsible category sections to handle 30+ policies. -->
<div class="ap-search-bar">
  <svg class="ap-search-icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
    <circle cx="10.5" cy="10.5" r="6" fill="none" stroke="currentColor" stroke-width="1.8"/>
    <path d="M15 15 L20 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  </svg>
  <input type="text" id="ap-search-input"
    placeholder="Filter policies…"
    data-i18n-attr-placeholder="alert_policies.search_placeholder"
    autocomplete="off" spellcheck="false">
  <button class="ap-search-clear" id="ap-search-clear" type="button"
    title="Clear filter" data-i18n-attr-title="alert_policies.search_clear_title"
    style="display:none;">×</button>
</div>

<!-- Section container is populated client-side via renderPolicies().
     One <div class="ap-section"> per category, each containing its own
     <table class="alert-table">. Sections support collapse/expand with
     localStorage persistence. -->
<div id="ap-sections-wrap"></div>
