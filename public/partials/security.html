<!-- ═══ SECURITY SETTINGS (Phase A1 — read-only) ═══ -->
<div class="panel-header" style="margin-bottom:16px;">
  <div class="panel-elbow" style="background: var(--p-warm);"></div>
  <span class="panel-title" data-i18n="security_page.title">Security — Settings Library</span>
</div>

<!-- Tenant picker (Refresh moved into the shared body partial so the dashboard
     Security tab gets it too) -->
<div class="sec-action-bar" style="display:flex; gap:12px; margin-bottom:20px; align-items:center; flex-wrap:wrap;">
  <label style="color:var(--p-text-muted); font-size:0.85rem;" data-i18n="security_page.label_tenant">Tenant</label>
  <select id="sec-tenant-picker" class="form-control" style="min-width:280px;">
    <option value="" data-i18n="security_page.option_select_tenant">Select a tenant…</option>
  </select>
</div>

<!-- Body markup (summary bar, filter chips, settings table, detail modal and
     preset-guide modal) is shared with the dashboard Security tab. It lives in
     /partials/security-body.html; SecurityPanel.mount() injects it here so the
     two surfaces can never drift apart. -->
<div id="sec-panel-body"></div>
